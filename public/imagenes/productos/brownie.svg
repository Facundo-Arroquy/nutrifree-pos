<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#efebe9"/><stop offset="100%" stop-color="#d7ccc8"/>
  </linearGradient>
  <linearGradient id="b" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#5d4037"/><stop offset="100%" stop-color="#3e2723"/>
  </linearGradient>
</defs>
<rect width="400" height="280" fill="url(#bg)"/>
<ellipse cx="200" cy="245" rx="110" ry="11" fill="rgba(0,0,0,.12)"/>
