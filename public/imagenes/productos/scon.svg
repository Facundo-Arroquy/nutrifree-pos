    <stop offset="0%" stop-color="#fffde7"/><stop offset="100%" stop-color="#fff9c4"/>
  </linearGradient>
</defs>
<rect width="400" height="280" fill="url(#bg)"/>
<ellipse cx="200" cy="248" rx="108" ry="11" fill="rgba(0,0,0,.1)"/>
