    <stop offset="0%" stop-color="#efebe9"/><stop offset="100%" stop-color="#d7ccc8"/>
  </linearGradient>
  <linearGradient id="br" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#d4913a"/><stop offset="100%" stop-color="#a05a1a"/>
  </linearGradient>
</defs>
<rect width="400" height="280" fill="url(#bg)"/>
<ellipse cx="200" cy="248" rx="138" ry="13" fill="rgba(0,0,0,.12)"/>
