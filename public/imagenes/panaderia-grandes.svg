<svg viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EFEBE9"/>
      <stop offset="100%" style="stop-color:#D7CCC8"/>
    </linearGradient>
    <linearGradient id="breadGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4913A"/>
      <stop offset="100%" style="stop-color:#A05A1A"/>
    </linearGradient>
    <linearGradient id="breadTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8A84A"/>
      <stop offset="100%" style="stop-color:#C4772A"/>
    </linearGradient>
  </defs>
  <rect width="500" height="300" fill="url(#bg)" rx="20"/>

  <!-- Bread loaf 1kg -->
  <g transform="translate(55, 75)">
    <ellipse cx="115" cy="178" rx="110" ry="12" fill="rgba(0,0,0,0.13)"/>
    <!-- Loaf body -->
    <rect x="15" y="100" width="200" height="78" rx="10" fill="url(#breadGrad)"/>
    <!-- Domed top -->
    <ellipse cx="115" cy="100" rx="100" ry="40" fill="url(#breadTop)"/>
    <!-- Score lines -->
    <path d="M55,72 L55,105" stroke="#C4772A" stroke-width="3" stroke-linecap="round"/>
    <path d="M85,65 L85,100" stroke="#C4772A" stroke-width="3" stroke-linecap="round"/>
    <path d="M115,62 L115,98" stroke="#C4772A" stroke-width="3" stroke-linecap="round"/>
    <path d="M145,65 L145,100" stroke="#C4772A" stroke-width="3" stroke-linecap="round"/>
    <path d="M175,72 L175,105" stroke="#C4772A" stroke-width="3" stroke-linecap="round"/>
    <!-- Shine -->
    <path d="M40,78 Q115,55 190,78" stroke="#F0C060" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.4"/>
    <!-- Seeds on top -->
    <ellipse cx="70" cy="70" rx="4" ry="2" fill="#8B5E1A" transform="rotate(-20,70,70)"/>
    <ellipse cx="95" cy="63" rx="4" ry="2" fill="#8B5E1A" transform="rotate(10,95,63)"/>
    <ellipse cx="120" cy="60" rx="4" ry="2" fill="#8B5E1A" transform="rotate(-15,120,60)"/>
    <ellipse cx="145" cy="63" rx="4" ry="2" fill="#8B5E1A" transform="rotate(20,145,63)"/>
    <ellipse cx="168" cy="70" rx="4" ry="2" fill="#8B5E1A" transform="rotate(-10,168,70)"/>
    <!-- Label tag -->
    <rect x="80" y="118" width="70" height="24" rx="4" fill="white" opacity="0.7"/>
    <text x="115" y="134" text-anchor="middle" font-family="Arial" font-size="11" fill="#7B4A1E" font-weight="bold">1 Kg</text>
  </g>

  <!-- Rosca -->
  <g transform="translate(310, 80)">
    <ellipse cx="85" cy="178" rx="82" ry="11" fill="rgba(0,0,0,0.12)"/>
    <!-- Ring base -->
    <circle cx="85" cy="135" r="75" fill="#C4772A"/>
    <circle cx="85" cy="135" r="42" fill="url(#bg)"/>
    <!-- Top shine layer -->
    <circle cx="85" cy="135" r="75" fill="none" stroke="#E8A84A" stroke-width="8" opacity="0.5"/>
    <!-- Icing drizzle -->
    <path d="M38,98 Q60,85 85,90 Q110,95 130,85" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.8"/>
    <path d="M28,115 Q55,105 80,110 Q105,115 130,105" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
    <!-- Cherries / fruits -->
    <circle cx="60" cy="82" r="8" fill="#E83030"/>
    <circle cx="85" cy="72" r="8" fill="#FFD700"/>
    <circle cx="112" cy="80" r="8" fill="#E83030"/>
    <circle cx="60" cy="82" r="5" fill="#EF5350"/>
    <circle cx="85" cy="72" r="5" fill="#FFEE58"/>
    <circle cx="112" cy="80" r="5" fill="#EF5350"/>
    <!-- Stem -->
    <path d="M60,74 Q58,65 63,60" stroke="#4CAF50" stroke-width="2" fill="none"/>
    <path d="M85,64 Q83,55 88,50" stroke="#4CAF50" stroke-width="2" fill="none"/>
    <path d="M112,72 Q110,63 115,58" stroke="#4CAF50" stroke-width="2" fill="none"/>
    <!-- Score marks -->
    <path d="M130,90 Q138,115 135,145" stroke="#A05A1A" stroke-width="2.5" fill="none" opacity="0.5"/>
    <path d="M38,108 Q30,132 35,158" stroke="#A05A1A" stroke-width="2.5" fill="none" opacity="0.5"/>
  </g>

  <!-- Text -->
  <text x="250" y="282" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#5D3A1A">Panadería — Grandes</text>
</svg>
