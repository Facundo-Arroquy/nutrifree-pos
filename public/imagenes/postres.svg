<svg viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F3E5F5"/>
      <stop offset="100%" style="stop-color:#E1BEE7"/>
    </linearGradient>
    <linearGradient id="choco" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5D4037"/>
      <stop offset="100%" style="stop-color:#3E2723"/>
    </linearGradient>
  </defs>
  <rect width="500" height="300" fill="url(#bg)" rx="20"/>
  <!-- Brownie slice -->
  <g transform="translate(110, 100)">
    <!-- Shadow -->
    <ellipse cx="65" cy="128" rx="68" ry="10" fill="rgba(0,0,0,0.15)"/>
    <!-- Brownie body -->
    <path d="M10,40 L120,40 L130,120 L0,120 Z" fill="url(#choco)"/>
    <path d="M10,40 L120,40 L115,50 L5,50 Z" fill="#6D4C41"/>
    <!-- Dulce de leche drizzle -->
    <path d="M20,55 Q50,45 80,58 Q100,65 115,55" stroke="#D4A017" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M10,75 Q45,65 75,78 Q100,85 125,70" stroke="#D4A017" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Meringue blob -->
    <ellipse cx="65" cy="38" rx="45" ry="20" fill="white"/>
    <ellipse cx="40" cy="30" rx="22" ry="14" fill="white"/>
    <ellipse cx="88" cy="28" rx="20" ry="13" fill="white"/>
    <ellipse cx="65" cy="22" rx="18" ry="12" fill="white"/>
    <!-- Toasted tips -->
    <circle cx="40" cy="22" r="4" fill="#D4A017" opacity="0.7"/>
    <circle cx="65" cy="14" r="4" fill="#D4A017" opacity="0.7"/>
    <circle cx="88" cy="18" r="4" fill="#D4A017" opacity="0.7"/>
  </g>

  <!-- Mousse cup -->
  <g transform="translate(280, 95)">
    <!-- Cup shadow -->
    <ellipse cx="65" cy="135" rx="55" ry="8" fill="rgba(0,0,0,0.12)"/>
    <!-- Cup -->
    <path d="M25,50 L105,50 L100,130 L30,130 Z" fill="#E8D5C0"/>
    <path d="M25,50 L105,50 L103,60 L27,60 Z" fill="#D4C0A8"/>
    <!-- Chocolate mousse -->
    <ellipse cx="65" cy="50" rx="40" ry="18" fill="#5D4037"/>
    <ellipse cx="65" cy="42" rx="38" ry="15" fill="#6D4C41"/>
    <ellipse cx="65" cy="35" rx="35" ry="12" fill="#7B5E52"/>
    <!-- Whipped cream on top -->
    <ellipse cx="65" cy="28" rx="32" ry="14" fill="white"/>
    <ellipse cx="48" cy="22" rx="16" ry="10" fill="white"/>
    <ellipse cx="80" cy="20" rx="14" ry="9" fill="white"/>
    <!-- Chocolate shavings -->
    <rect x="55" y="12" width="20" height="4" rx="2" fill="#5D4037" transform="rotate(-20,65,14)"/>
    <rect x="48" y="16" width="16" height="3" rx="2" fill="#5D4037" transform="rotate(15,56,17)"/>
    <rect x="68" y="9" width="18" height="3" rx="2" fill="#5D4037" transform="rotate(-10,77,10)"/>
  </g>

  <!-- Truffle -->
  <g transform="translate(195, 175)">
    <circle cx="30" cy="30" r="30" fill="#3E2723"/>
    <circle cx="30" cy="30" r="26" fill="#4E342E"/>
    <!-- Cocoa dusting -->
    <circle cx="22" cy="22" r="3" fill="#6D4C41" opacity="0.6"/>
    <circle cx="38" cy="20" r="2" fill="#6D4C41" opacity="0.6"/>
    <circle cx="18" cy="35" r="2.5" fill="#6D4C41" opacity="0.6"/>
    <circle cx="40" cy="38" r="3" fill="#6D4C41" opacity="0.6"/>
  </g>

  <!-- Text -->
  <text x="250" y="282" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="#6A1B9A">Postres</text>
</svg>
