<svg viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8E1"/>
      <stop offset="100%" style="stop-color:#FFECB3"/>
    </linearGradient>
  </defs>
  <rect width="500" height="300" fill="url(#bg)" rx="20"/>

  <!-- Alfajor -->
  <g transform="translate(60, 90)">
    <!-- Shadow -->
    <ellipse cx="75" cy="128" rx="70" ry="9" fill="rgba(0,0,0,0.12)"/>
    <!-- Bottom cookie -->
    <ellipse cx="75" cy="115" rx="60" ry="14" fill="#D4A05A"/>
    <rect x="15" y="70" width="120" height="46" rx="8" fill="#D4A05A"/>
    <ellipse cx="75" cy="70" rx="60" ry="14" fill="#E8B870"/>
    <!-- DDL filling -->
    <rect x="18" y="80" width="114" height="22" fill="#C4802A"/>
    <!-- Top cookie -->
    <ellipse cx="75" cy="82" rx="60" ry="14" fill="#D4A05A"/>
    <rect x="15" y="35" width="120" height="48" rx="8" fill="#D4A05A"/>
    <ellipse cx="75" cy="35" rx="60" ry="14" fill="#E8B870"/>
    <!-- Chocolate coating -->
    <rect x="13" y="35" width="124" height="82" rx="10" fill="#5D3A1A" opacity="0.25"/>
    <ellipse cx="75" cy="35" rx="62" ry="15" fill="#7B4A1E" opacity="0.4"/>
    <!-- Shine -->
    <ellipse cx="55" cy="30" rx="18" ry="6" fill="white" opacity="0.25"/>
  </g>

  <!-- Budin loaf -->
  <g transform="translate(210, 100)">
    <!-- Shadow -->
    <ellipse cx="80" cy="125" rx="78" ry="9" fill="rgba(0,0,0,0.12)"/>
    <!-- Loaf body -->
    <rect x="8" y="50" width="144" height="72" rx="8" fill="#C4873A"/>
    <!-- Top dome -->
    <ellipse cx="80" cy="50" rx="72" ry="24" fill="#D4983A"/>
    <!-- Cracks / texture on top -->
    <path d="M40,38 Q80,28 120,38" stroke="#E8B050" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M55,32 Q80,25 105,32" stroke="#E8B050" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Sugar glaze -->
    <path d="M20,55 Q50,48 80,52 Q110,56 150,50" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
    <!-- Orange slices decoration -->
    <circle cx="55" cy="35" r="10" fill="#FF8F00" opacity="0.8"/>
    <circle cx="55" cy="35" r="7" fill="#FFA726" opacity="0.8"/>
    <line x1="55" y1="28" x2="55" y2="42" stroke="#E65100" stroke-width="1" opacity="0.6"/>
    <line x1="48" y1="35" x2="62" y2="35" stroke="#E65100" stroke-width="1" opacity="0.6"/>
    <circle cx="105" cy="33" r="9" fill="#FF8F00" opacity="0.8"/>
    <circle cx="105" cy="33" r="6" fill="#FFA726" opacity="0.8"/>
    <line x1="105" y1="27" x2="105" y2="39" stroke="#E65100" stroke-width="1" opacity="0.6"/>
    <line x1="99" y1="33" x2="111" y2="33" stroke="#E65100" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Cookies -->
  <g transform="translate(380, 105)">
    <!-- Cookie stack -->
    <ellipse cx="48" cy="118" rx="43" ry="8" fill="rgba(0,0,0,0.12)"/>
    <!-- Bottom cookie -->
    <ellipse cx="48" cy="110" rx="40" ry="10" fill="#A0622A"/>
    <!-- Middle cookie -->
    <ellipse cx="48" cy="95" rx="40" ry="10" fill="#B87333"/>
    <ellipse cx="48" cy="88" rx="38" ry="9" fill="#C4843A"/>
    <!-- Top cookie -->
    <ellipse cx="48" cy="75" rx="40" ry="10" fill="#B87333"/>
    <ellipse cx="48" cy="68" rx="38" ry="9" fill="#C4843A"/>
    <!-- Choco chips -->
    <circle cx="35" cy="64" r="4" fill="#3E2723"/>
    <circle cx="55" cy="60" r="4" fill="#3E2723"/>
    <circle cx="48" cy="70" r="3.5" fill="#3E2723"/>
    <circle cx="62" cy="66" r="3.5" fill="#3E2723"/>
    <circle cx="30" cy="68" r="3" fill="#3E2723"/>
  </g>

  <!-- Text -->
  <text x="250" y="282" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="#8B5E00">Pastelería</text>
</svg>
